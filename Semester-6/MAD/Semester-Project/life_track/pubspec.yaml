name: life_track
description: "LifeTrack - Age & Birthday Tracker App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Core utility
  uuid: ^4.5.1

  # UI
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  firebase_database: ^11.0.0

  # State Management
  provider: ^6.1.2

  # Local Database (Offline support)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Networking (API calls: Zodiac + AI)
  http: ^1.2.0

  # Notifications
  flutter_local_notifications: ^17.0.0

  # Date & formatting
  intl: ^0.19.0

  # Biometric authentication
  local_auth: ^2.2.0

  # Permissions
  permission_handler: ^11.3.0

  # Share / Screenshot (birthday card sharing)
  share_plus: ^10.0.0
  screenshot: ^3.0.0

  # UI enhancements
  flutter_svg: ^2.0.10

  # Local storage for DOB saving
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  hive_generator: ^2.0.1
  build_runner: ^2.4.9

flutter:
  uses-material-design: true