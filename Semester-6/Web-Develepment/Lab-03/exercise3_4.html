<!DOCTYPE html>
<html>
<head>
    <title>Travel Reservation Form</title>
</head>

<body style="background-color:#f2f2f2;">

<div style="width:600px; margin:40px auto; border:1px solid black; padding:20px; background:white;">

    <h2>Travel reservation form</h2>

    <p><b>* denotes mandatory</b></p>

    <form>

        <label>Full name*:</label><br>
        <input type="text" placeholder="FirstName LastName"><br><br>

        <label>Email address*:</label><br>
        <input type="email" placeholder="EMAIL_ADDRESS"><br><br>

        <label>Select Tour Package*:</label><br>
        <select>
            <option>Goa</option>
            <option>Murree</option>
            <option>Hunza</option>
        </select><br><br>

        <label>Arrival date*:</label><br>
        <input type="date"><br><br>

        <label>Number of persons*:</label><br>
        <input type="number" placeholder="UNKNOWN_TYPE"><br><br>

        <label>What would you want to avail?*</label><br>
        <input type="checkbox"> Boarding <br>
        <input type="checkbox"> Fooding <br>
        <input type="checkbox"> Sight seeing <br><br>

        <label>Discount Coupon code:</label><br>
        <input type="text" placeholder="UNKNOWN_TYPE"><br><br>

        <label>Terms and conditions*</label><br>
        <input type="radio" name="terms"> I agree
        <input type="radio" name="terms"> I disagree
        <br><br>

        <input type="submit" value="Complete reservation">

    </form>

    <br><br>

    <!-- First YouTube Video -->
    <iframe width="560" height="315"
        src="https://www.youtube.com/embed/aqz-KE-bpKQ"
        title="YouTube video"
        frameborder="0"
        allowfullscreen>
    </iframe>

    <br><br>

    <!-- Second YouTube Video (Your Added Video) -->
    <iframe width="560" height="315"
        src="https://www.youtube.com/embed/k5EpEaaJGwg?si=40b6ufWaOIl1Esnj"
        title="YouTube video player"
        frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        referrerpolicy="strict-origin-when-cross-origin"
        allowfullscreen>
    </iframe>

</div>

</body>
</html>
