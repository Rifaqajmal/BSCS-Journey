<!DOCTYPE html>
<html>
<head>
    <title>Exercise 4.2</title>

    <style>
        body {
            background-color: #f2f2f2;
            font-family: Arial;
        }

        .container {
            width: 800px;
            margin: 30px auto;
            border: 1px solid black;
            padding: 15px;
            background: white;
        }

     
        .header {
            background: #2f80d0;
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-weight: bold;
        }

     
        .middle {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .main {
            background: #3fa86a;
            flex: 3;
            padding: 15px;
            border-radius: 10px;
        }

        .sidebar {
            background: #ff5c3a;
            flex: 1;
            padding: 15px;
            border-radius: 10px;
            color: white;
            font-weight: bold;
        }

    
        .items {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 10px;
        }

        .item {
            width: 22%;
            background: #2e8b57;
            color: white;
            text-align: center;
            padding: 20px 0;
            border-radius: 10px;
            font-weight: bold;
        }

        
        .footer {
            background: #4a67c4;
            color: white;
            padding: 20px;
            border-radius: 10px;
            font-weight: bold;
        }
    </style>

</head>

<body>

<div class="container">

    <div class="header">header</div>

    <div class="middle">

        <div class="main">
            main

            <div class="items">
                <div class="item">item</div>
                <div class="item">item</div>
                <div class="item">item</div>
                <div class="item">item</div>

                <div class="item">item</div>
                <div class="item">item</div>
                <div class="item">item</div>
                <div class="item">item</div>

                <div class="item">item</div>
                <div class="item">item</div>
                <div class="item">item</div>
            </div>
        </div>

        <div class="sidebar">sidebar</div>

    </div>

    <div class="footer">footer</div>

</div>

</body>
</html>
